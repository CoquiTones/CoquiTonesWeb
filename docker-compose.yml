services:
  backend:
    build:
      context: .
      dockerfile: ./backend.Dockerfile
    volumes:
      - ./backend:/app/backend
      - ./frontend/dist:/app/frontend/dist
    ports:
      - 8080:8080  # Keep access limited to localhost
    depends_on:
      - database
    command: uvicorn --app-dir backend/src app:app --reload --host 0.0.0.0 --port 8080 --ssl-keyfile ./localhost.key --ssl-certfile ./localhost.crt

  frontend:
    build:
      context: .
      dockerfile: ./frontend.Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevent node_modules overwrite
    ports:
      - 5173:5173  # Keep access limited to localhost
    command: npm run start -- --host 0.0.0.0  # Allow access from all interfaces
    environment:
      - CHOKIDAR_USEPOLLING=true

  database:
    image: postgres:latest
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secrettest
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432

  # This will just be a dependency that fixes the ownership of the files the broker will need write access for.
  mqtt-init:
    image: alpine
    volumes: 
    - ./mosquitto/config:/mosquitto/config
    command: chown -R 1883:1883 /mosquitto/config && chmod -R 775 /data

  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mosquitto
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    ports:
      - 1883:1883
      - 2043:2043
    stdin_open: true
    tty: true
    depends_on:
      - mqtt-init
    env_file: "./backend/src/.env"
